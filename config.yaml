# ─────────────────────────────────────────────────────────────
# Benchmarks — Umbrales para semáforos y alertas
# Modifica estos valores para ajustar los criterios de decisión.
# ─────────────────────────────────────────────────────────────
benchmarks:
  cpl:
    good: 15          # CPL ≤ good → verde
    review: 25        # CPL > good y ≤ review → amarillo
    pause: 40         # CPL > pause → rojo / pausar
    optimal_line: 15  # Línea de referencia en gráficos

  roas:
    bad: 1            # ROAS < bad → rojo
    good: 2           # ROAS ≥ good → verde (con CPL bajo)
    excellent: 4      # Referencia para gráfico barras

  coste_entrevista:
    good: 60
    bad: 100

  leads:
    good: 100
    bad: 50

  matriculados:
    good: 5
    bad: 2

  conv_lead_matricula:
    good: 5           # porcentaje
    bad: 2

# ─────────────────────────────────────────────────────────────
# HubSpot — Configuración de integración API
# ─────────────────────────────────────────────────────────────
# El access_token se configura en Streamlit Secrets (no aquí).
# Solo se usan estos mapeos si HubSpot está habilitado.
# ─────────────────────────────────────────────────────────────
hubspot:
  pipeline_id: "default"
  stage_mapping:
    exploración: "Exploración"
    consideración: "Consideración"
    decisión: "Decisión"
  utm_source_mapping:
    facebook: "Meta Ads (FB/IG)"
    instagram: "Meta Ads (FB/IG)"
    google: "Google Ads"
    youtube: "YouTube Ads"
    linkedin: "LinkedIn Ads"

# ─────────────────────────────────────────────────────────────
# Ads APIs — Mapeo de nombres de campaña
# ─────────────────────────────────────────────────────────────
# Si el nombre de la campaña en la plataforma de ads no coincide
# con el ID_Campaña del dashboard, añadir aquí el mapeo.
# Formato: nombre_en_plataforma: id_campana_dashboard
# ─────────────────────────────────────────────────────────────
ads:
  campaign_name_mapping: {}
